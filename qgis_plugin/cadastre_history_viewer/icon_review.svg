<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Parcel grid -->
  <rect x="1" y="1" width="30" height="30" rx="2" fill="#f0f7f0" stroke="#2e7d32" stroke-width="1.5"/>
  <rect x="3"  y="3"  width="12" height="10" fill="#81c784" stroke="#2e7d32" stroke-width="1"/>
  <rect x="17" y="3"  width="12" height="14" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1"/>
  <rect x="3"  y="15" width="12" height="14" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1"/>
  <rect x="17" y="19" width="12" height="10" fill="#81c784" stroke="#2e7d32" stroke-width="1"/>
  <!-- Green + badge (approve) -->
  <circle cx="9" cy="23" r="6" fill="#4CAF50"/>
  <line x1="9" y1="19.5" x2="9" y2="26.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="5.5" y1="23"  x2="12.5" y2="23"  stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Red X badge (reject) -->
  <circle cx="23" cy="23" r="6" fill="#f44336"/>
  <line x1="20" y1="20" x2="26" y2="26" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="26" y1="20" x2="20" y2="26" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
</svg>
